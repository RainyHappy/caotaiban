<!DOCTYPE html><html><head><meta charset="UTF-8"><title>草台班长</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(180deg,#2d3436 0%,#1e272e 100%);color:#fff;min-height:100vh;padding:30px;padding-bottom:150px}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;font-size:26px;font-weight:900;text-shadow:2px 2px 0 #e17055;margin-top:20px}
.subtitle{text-align:center;color:#a4b0be;font-size:12px;margin-bottom:15px}
.wish-input{display:flex;gap:10px;margin-bottom:15px}
.wish-input input{flex:1;padding:12px;border:none;border-radius:25px;background:rgba(255,255,255,0.1);color:#fff;font-size:14px}
.wish-input input::placeholder{color:#636e72}
.wish-input button{padding:12px 20px;border:none;border-radius:25px;background:#00b894;color:#fff;font-size:14px;cursor:pointer}
.tips-scroll{height:120px;overflow:hidden;position:relative;margin-bottom:15px;border-radius:8px;background:rgba(255,255,255,0.05)}
.tips-track{position:absolute;width:100%;height:100%}
.tip-row{position:absolute;width:100%;display:flex;align-items:center;white-space:nowrap;animation:marquee 20s linear infinite}
.tip-row:nth-child(1){top:0}
.tip-row:nth-child(2){top:40px}
.tip-row:nth-child(3){top:80px}
.tip-row .tip{padding:0 30px;font-size:14px;color:#b2bec3;height:40px;display:flex;align-items:center}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
.modes{display:flex;gap:12px;margin-bottom:25px}
.mode-btn{flex:1;padding:18px 8px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:bold;color:#fff;transition:all 0.2s}
.fubi{background:linear-gradient(135deg,#ff7675,#d63031)}
.weiqu{background:linear-gradient(135deg,#74b9ff,#0984e3)}
.shengqi{background:linear-gradient(135deg,#a29bfe,#6c5ce7)}
.axing{background:linear-gradient(135deg,#ffeaa7,#f39c12);color:#2d3436}
.mode-btn.active{transform:scale(1.05);box-shadow:0 0 15px rgba(255,255,255,0.3)}
#chat-area{display:none}
#chat-area.show{display:block}
#chat-header{margin-bottom:10px}
#chat-header h2{font-size:18px;margin-bottom:4px}
#hint{color:#a4b0be;font-size:13px}
#chat{height:350px;overflow-y:auto;padding:15px;background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:20px}
.msg{padding:10px 12px;border-radius:8px;margin:8px 0;word-break:break-all;font-size:14px}
.user{background:rgba(116,185,255,0.2);text-align:right;color:#74b9ff}
.ai{background:rgba(255,255,255,0.1);text-align:left}
.input-area{display:none;gap:10px}
.input-area.show{display:flex}
input{flex:1;padding:14px;border:none;border-radius:25px;background:rgba(255,255,255,0.1);color:#fff;font-size:15px}
input::placeholder{color:#636e72}
.send-btn{padding:14px 24px;border:none;border-radius:25px;background:#e17055;color:#fff;font-size:15px;cursor:pointer}
.end-btn{padding:14px 24px;border:none;border-radius:25px;background:#636e72;color:#fff;font-size:15px;cursor:pointer;margin-left:10px}
.dialog-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.dialog{background:#2d3436;padding:40px;border-radius:16px;text-align:center}
.dialog p{font-size:20px;margin-bottom:25px;color:#fff}
.confirm-btn{padding:14px 40px;border:none;border-radius:25px;background:#00b894;color:#fff;font-size:16px;cursor:pointer}
.thinking{color:#636e72;font-style:italic}
</style></head><body><div class="container">
<h1>世界就是个巨大的草台班子</h1>
<p class="subtitle"></p>
<div class="wish-input"><input type="text" id="wish-msg" placeholder="留下你的祝福，传递正能量~" onkeypress="if(event.key==='Enter')addWish()"><button onclick="addWish()">送祝福</button></div>
<div class="tips-scroll"><div class="tips-track" id="tips-track"></div></div>
<div class="modes">
<button class="mode-btn fubi" onclick="selectMode('fubi')">💢 又TM挨骂了</button>
<button class="mode-btn weiqu" onclick="selectMode('weiqu')">🥺 求安慰</button>
<button class="mode-btn shengqi" onclick="selectMode('shengqi')">😤 去NM的</button>
<button class="mode-btn axing" onclick="selectMode('axing')">👊 骂醒我</button>
</div>
<div id="chat-area">
<div id="chat-header"><h2 id="mode-title"></h2><p id="hint"></p></div>
<div id="chat"></div>
</div>
<div class="input-area" id="input-area">
<input type="text" id="msg" placeholder="说点什么..." onkeypress="if(event.key==='Enter')send()"><button class="send-btn" onclick="send()">发射</button><button class="end-btn" onclick="showEndDialog()">结束</button>
</div>
</div>
<div id="end-dialog" class="dialog-overlay" style="display:none"><div class="dialog"><p>要开心，要爱自己！</p><button class="confirm-btn" onclick="endChat()">必须的</button></div></div>
<script>
const allTips={fubi:["敢骂你？干回去怕什么","那种人也配让你生气？笑死","不服就是干，别惯着","骂回去啊怂什么","怕个卵干就完了","就这？不够塞牙缝的","跟他刚到底","凭什么惯着他"],weiqu:["说说吧又咋了","我听着呢","哎真服了你了","来倒倒苦水","抱抱你，不哭了","我在呢","又受委屈了吧","苦命娃"],shengqi:["骂，使劲骂","干他娘的","不服就是干","发泄出来","骂个痛快","谁惹你了我去","干就完了","生气就骂"],axing:["别装了该干嘛干嘛","废物不配emo","矫情啥呢","赶紧起来干活","别给自己找借口","就是懒","行动大于一切","少废话就是干"],default:["如果你快乐，就别点进来","进来是释放，出去是晴天","骂两句就舒服了","点击是因为不爽","情绪垃圾桶随时开业","接收所有垃圾情绪","负面能量释放站","可以骂可以哭可以闹"]};
const negativeWords=["垃圾","废物","傻","笨","蠢","死","滚","丑","穷","弱","菜"," TMD","他妈的","cao","nm","Fuck","shit","damn","stupid","idiot","loser"];
const userWishes=[];
async function loadWishes(){try{const r=await fetch("/api/wishes");const d=await r.json();userWishes.length=0;userWishes.push(...d.wishes);refreshTips()}catch(e){console.log("加载祝福语失败",e)}}
function isNegative(text){const t=text.toLowerCase();return negativeWords.some(w=>t.includes(w.toLowerCase()))}
async function addWish(){const i=document.getElementById("wish-msg");const v=i.value.trim();if(!v)return;if(isNegative(v)){alert("请输入正面积极的祝福语~");return}try{await fetch("/api/wishes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({wish:v})})}catch(e){console.log("保存失败",e)}userWishes.push(v);i.value="";refreshTips()}
function refreshTips(){let base=allTips[currentMode]||allTips.default;tipsData=userWishes.length>0?shuffle([...base,...userWishes]):base;tipIdx=Math.floor(Math.random()*tipsData.length);renderTips()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let currentMode="",tipIdx=0,scrollTimer,tipsData=[];
function setModeTips(m){let base=allTips[m]||allTips.default;tipsData=userWishes.length>0?shuffle([...base,...userWishes]):base;tipIdx=Math.floor(Math.random()*tipsData.length);renderTips()}
function renderTips(){const track=document.getElementById("tips-track");let rows=3;let html="";let shuffled=shuffle([...tipsData]);for(let r=0;r<rows;r++){let delay=-r*10;let startIdx=r*(Math.ceil(shuffled.length/rows));let rowData=shuffled.slice(startIdx,startIdx+Math.ceil(shuffled.length/rows));let content=rowData.map(t=>`<span class="tip">${t}</span>`).join('');html+=`<div class="tip-row" style="animation-delay:${delay}s;animation-duration:${30+r*5}s">${content}${content}</div>`}track.innerHTML=html}
const modeInfo={fubi:{title:"💢 又TM挨骂了",hint:"咋的了哥们儿，让人给煮了？",firstMsg:"来了来了，谁TM又惹你了？说说看，班长给你撑腰"},weiqu:{title:"🥺 求安慰",hint:"宝儿你咋又来了，这次又怎么啦？",firstMsg:"哎，看着就心疼。过来坐，跟我说说又受啥委屈了"},shengqi:{title:"😤 去NM的",hint:"去nm的，垃圾，屮！",firstMsg:"我cao。又TM跟谁干起来了？来来来，先骂一顿消消气"},axing:{title:"👊 骂醒我",hint:"来来来，听说你在找骂？小辣鸡！",firstMsg:"哟呵，主动找骂来了？行，看我怎么骂醒你个废物"}};
function selectMode(m){currentMode=m;document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));document.querySelector("."+m).classList.add("active");document.getElementById("chat-area").classList.add("show");document.getElementById("input-area").classList.add("show");document.getElementById("mode-title").innerText=modeInfo[m].title;document.getElementById("hint").innerText=modeInfo[m].hint;refreshTips();document.getElementById("chat").innerHTML="";addMessage("班长",modeInfo[m].firstMsg)}
function addMessage(who,text){const c=document.getElementById("chat");const p=document.createElement("p");p.className="msg "+(who==="班长"?"ai":"user");p.innerText=who+": "+text;c.appendChild(p);c.scrollTop=c.scrollHeight}
async function send(){const i=document.getElementById("msg");const m=i.value;if(!m)return;addMessage("你",m);i.value="";addMessage("班长","思考中...");
try{const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:currentMode,message:m})});const d=await r.json();const c=document.getElementById("chat");c.removeChild(c.lastChild);addMessage("班长",d.reply)}catch(e){const c=document.getElementById("chat");c.removeChild(c.lastChild);addMessage("班长","出错: "+e)}}
function showEndDialog(){document.getElementById("end-dialog").style.display="flex"}
function endChat(){document.getElementById("end-dialog").style.display="none";document.getElementById("chat-area").classList.remove("show");document.getElementById("input-area").classList.remove("show");document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));setModeTips("default")}
setModeTips("default");
loadWishes();
window.onbeforeunload=function(){return"要开心，要爱自己~"};
</script></body></html>
